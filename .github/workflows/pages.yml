name: Build and publish PortableLM

on:
  push:
    branches:
      - milestone-1-local-inference-proof
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portablelm-main-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Verify and build
        run: |
          npm run vendor:runtime
          npm run verify:assets
          npm test
          npm run build
          npm run test:dist

      - name: Publish compiled site to main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false
          commit_message: Publish compiled Milestone 1 site
